<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Vehículos</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="navbar">

        <div class="logo">
            🚗 Gestión Vehículos
        </div>

        <nav class="menu">
            <button onclick="window.location.href='panel.html'">
                Inicio
            </button>

            <button onclick="window.location.href='registro.html'">
                Usuarios
            </button>

            <button onclick="window.location.href='vehiculos.html'">
                Vehículos
            </button>

            <button onclick="window.location.href='conductores.html'">
                Conductores
            </button>

            <button onclick="window.location.href='mantenimientos.html'">
                Mantenimientos
            </button>

            <button class="btn-salir" onclick="cerrarSesion()">
                Salir
            </button>
        </nav>

    </header>

    <div class="container">

        <h1>Gestión de Vehículos</h1>

        <input type="hidden" id="id">

        <input type="text" id="placa" placeholder="Placa del vehículo">

        <input type="text" id="marca" placeholder="Marca">

        <input type="text" id="modelo" placeholder="Modelo">

        <input type="text" id="color" placeholder="Color">

        <input type="text" id="estado" placeholder="Estado" value="Activo">

        <button onclick="guardarVehiculo()">
            Guardar vehículo
        </button>

        <button class="btn-secundario" onclick="limpiarFormulario()">
            Limpiar formulario
        </button>

        <p id="mensaje"></p>

        <h2>Vehículos registrados</h2>

        <div id="listaVehiculos"></div>

    </div>

    <script src="global.js"></script>
    <script src="vehiculos.js"></script>

</body>

</html>
