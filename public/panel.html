<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Principal</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="navbar">

        <div class="logo">
            🚗 Gestión Vehículos
        </div>

        <nav class="menu">
            <button id="btnUsuarios" onclick="window.location.href='registro.html'">
                Usuarios
            </button>

            <button id="btnVehiculos" onclick="window.location.href='vehiculos.html'">
                Vehículos
            </button>

            <button id="btnConductores" onclick="window.location.href='conductores.html'">
                Conductores
            </button>

            <button id="btnMantenimientos" onclick="window.location.href='mantenimientos.html'">
                Mantenimientos
            </button>

            <button class="btn-salir" onclick="cerrarSesion()">
                Salir
            </button>
        </nav>

    </header>

    <main class="contenido">

        <div class="container">

            <h1>Panel Principal</h1>

            <h2 id="bienvenida">Bienvenido</h2>

            <img id="fotoUsuario" class="foto-panel" src="" alt="Foto de perfil">

            <div class="dashboard">

                <div class="card-dashboard">
                    <h3>Usuarios</h3>
                    <p id="totalUsuarios">0</p>
                </div>

                <div class="card-dashboard">
                    <h3>Vehículos</h3>
                    <p id="totalVehiculos">0</p>
                </div>

                <div class="card-dashboard">
                    <h3>Conductores</h3>
                    <p id="totalConductores">0</p>
                </div>

                <div class="card-dashboard">
                    <h3>Mantenimientos</h3>
                    <p id="totalMantenimientos">0</p>
                </div>

            </div>

        </div>

    </main>

    <script src="global.js"></script>
    <script src="panel.js"></script>

</body>

</html>
