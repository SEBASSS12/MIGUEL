<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Mantenimientos</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="navbar">

        <div class="logo">
            🚗 Gestión Vehículos
        </div>

        <nav class="menu">
            <button onclick="window.location.href='panel.html'">
                Inicio
            </button>

            <button onclick="window.location.href='registro.html'">
                Usuarios
            </button>

            <button onclick="window.location.href='vehiculos.html'">
                Vehículos
            </button>

            <button onclick="window.location.href='conductores.html'">
                Conductores
            </button>

            <button onclick="window.location.href='mantenimientos.html'">
                Mantenimientos
            </button>

            <button class="btn-salir" onclick="cerrarSesion()">
                Salir
            </button>
        </nav>

    </header>

    <div class="container">

        <h1>Gestión de Mantenimientos</h1>

        <input type="hidden" id="id">

        <select id="vehiculo_id">
            <option value="">Seleccione un vehículo</option>
        </select>

        <select id="tipo">
            <option value="">Seleccione tipo de mantenimiento</option>
            <option value="Preventivo">Preventivo</option>
            <option value="Correctivo">Correctivo</option>
        </select>

        <input type="date" id="fecha">

        <input type="text" id="descripcion" placeholder="Descripción del mantenimiento">

        <select id="estado">
            <option value="Pendiente">Pendiente</option>
            <option value="En proceso">En proceso</option>
            <option value="Finalizado">Finalizado</option>
        </select>

        <input type="text" id="responsable" placeholder="Responsable">

        <button onclick="guardarMantenimiento()">
            Guardar mantenimiento
        </button>

        <button class="btn-secundario" onclick="limpiarFormulario()">
            Limpiar formulario
        </button>

        <p id="mensaje"></p>

        <h2>Mantenimientos registrados</h2>

        <div id="listaMantenimientos"></div>

    </div>

    <script src="global.js"></script>
    <script src="mantenimientos.js"></script>

</body>

</html>
